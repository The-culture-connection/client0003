# Railway deployment config for Digital Curriculum (Vite + React SPA)
# When linking this project, set Root Directory to "Digital Curriculum" in the service settings.
# Build uses src/mortar-analytics-contract (not ../functions) so Docker/Nixpacks contexts without the monorepo succeed.
# Watch Paths: from repo root, so this service only deploys when files under Digital Curriculum change.

[build]
builder = "nixpacks"
buildCommand = "npm run build"
watchPatterns = ["Digital Curriculum", "Digital Curriculum/**"]

[deploy]
startCommand = "npx serve -s dist -l $PORT"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
