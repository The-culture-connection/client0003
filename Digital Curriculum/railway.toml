# Railway deployment config for Digital Curriculum (Vite + React SPA)
# When linking this project, set Root Directory to "Digital Curriculum" in the service settings.
# Build uses src/mortar-analytics-contract (not ../functions) so Docker/Nixpacks contexts without the monorepo succeed.
# Watch Paths: from repo root, so this service only deploys when files under Digital Curriculum change.

[build]
builder = "nixpacks"
# 1) Builders often install with NODE_ENV=production first, so Vite (a devDependency) is missing.
# 2) Do NOT run a second `npm ci` here: it tries to rmdir the whole tree and can hit EBUSY on
#    `node_modules/.cache` when an install layer already ran. `npm install --include=dev` only
#    adds devDependencies on top of the existing tree, then we build.
buildCommand = "npm install --include=dev --no-audit --no-fund && npm run build"
watchPatterns = ["Digital Curriculum", "Digital Curriculum/**"]

[deploy]
startCommand = "npx serve -s dist -l $PORT"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10
